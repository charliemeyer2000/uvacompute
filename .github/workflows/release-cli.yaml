name: Release CLI

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: false
        type: choice
        options:
          - none
          - patch
          - minor
          - major
        default: "none"
      custom_version:
        description: "Custom version (e.g., 1.2.3) - leave empty to use version_type"
        required: false
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine new version
        id: version
        run: |
          cd apps/cli
          CURRENT_VERSION=$(cat package.json | jq -r '.version')
          echo "Current version: $CURRENT_VERSION"

          if [ -n "${{ inputs.custom_version }}" ]; then
            NEW_VERSION="${{ inputs.custom_version }}"
            echo "Using custom version: $NEW_VERSION"
          elif [ "${{ inputs.version_type }}" != "none" ]; then
            IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"
            case "${{ inputs.version_type }}" in
              major)
                NEW_VERSION="$((major + 1)).0.0"
                ;;
              minor)
                NEW_VERSION="${major}.$((minor + 1)).0"
                ;;
              patch)
                NEW_VERSION="${major}.${minor}.$((patch + 1))"
                ;;
            esac
            echo "Bumping ${{ inputs.version_type }}: $NEW_VERSION"
          else
            echo "Error: Must specify either custom_version or version_type"
            exit 1
          fi

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update package.json and man page
        run: |
          cd apps/cli
          jq '.version = "${{ steps.version.outputs.new_version }}"' package.json > package.json.tmp
          mv package.json.tmp package.json
          cat package.json

          RELEASE_DATE=$(date '+%B %Y')
          sed -i.bak "s/^\.TH UVA 1 \"[^\"]*\" \"uvacompute [^\"]*\"/.TH UVA 1 \"${RELEASE_DATE}\" \"uvacompute ${{ steps.version.outputs.new_version }}\"/" uva.1
          rm uva.1.bak

      - name: Commit version bump
        run: |
          git add apps/cli/package.json apps/cli/uva.1
          git commit -m "chore(cli): bump version to ${{ steps.version.outputs.new_version }}"
          git tag "cli-v${{ steps.version.outputs.new_version }}"
          git push origin HEAD:${{ github.ref_name }}
          git push origin "cli-v${{ steps.version.outputs.new_version }}"

  build:
    needs: release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            artifact: uvacompute-linux
          - os: macos-latest
            target: darwin-x64
            artifact: uvacompute-macos
          - os: windows-latest
            target: win32-x64
            artifact: uvacompute-windows.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cli-v${{ needs.release.outputs.version }}

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install
        working-directory: ./apps/cli

      - name: Build binary
        run: bun build --compile --define process.env.NODE_ENV='"production"' ./index.ts --outfile ./dist/${{ matrix.artifact }}
        working-directory: ./apps/cli

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ./apps/cli/dist/${{ matrix.artifact }}
          retention-days: 1

  upload-man-page:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cli-v${{ needs.release.outputs.version }}

      - name: Upload man page artifact
        uses: actions/upload-artifact@v4
        with:
          name: uva.1
          path: ./apps/cli/uva.1
          retention-days: 1

  create-release:
    needs: [release, build, upload-man-page]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cli-v${{ needs.release.outputs.version }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: cli-v${{ needs.release.outputs.version }}
          name: CLI v${{ needs.release.outputs.version }}
          files: |
            ./dist/uvacompute-linux/uvacompute-linux
            ./dist/uvacompute-macos/uvacompute-macos
            ./dist/uvacompute-windows.exe/uvacompute-windows.exe
            ./dist/uva.1/uva.1
          generate_release_notes: true

  update-flake:
    needs: [release, create-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - uses: cachix/install-nix-action@v30

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update flake.nix hashes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          TAG="cli-v${VERSION}"

          # Download release assets
          gh release download "$TAG" -p 'uvacompute-linux' -p 'uvacompute-macos' -p 'uva.1' -D /tmp/assets

          # Compute SRI hashes
          LINUX_HASH=$(nix-hash --type sha256 --flat --sri /tmp/assets/uvacompute-linux)
          MACOS_HASH=$(nix-hash --type sha256 --flat --sri /tmp/assets/uvacompute-macos)
          MAN_HASH=$(nix-hash --type sha256 --flat --sri /tmp/assets/uva.1)

          echo "Linux hash: $LINUX_HASH"
          echo "macOS hash: $MACOS_HASH"
          echo "Man page hash: $MAN_HASH"

          # Update flake.nix
          sed -i "s|version = \".*\";|version = \"${VERSION}\";|" flake.nix

          # Update Linux hash (match the asset line to avoid hitting supportedSystems)
          sed -i "/uvacompute-linux/,/};/{s|hash = \"sha256-.*\";|hash = \"${LINUX_HASH}\";|}" flake.nix

          # Update macOS hash
          sed -i "/uvacompute-macos/,/};/{s|hash = \"sha256-.*\";|hash = \"${MACOS_HASH}\";|}" flake.nix

          # Update man page hash
          sed -i "s|manPageHash = \"sha256-.*\";|manPageHash = \"${MAN_HASH}\";|" flake.nix

          cat flake.nix

      - name: Update flake.lock
        run: nix flake update

      - name: Rebuild hosted flake tarball
        run: |
          mkdir -p /tmp/flake-tarball/source
          cp flake.nix /tmp/flake-tarball/source/flake.nix
          cp flake.lock /tmp/flake-tarball/source/flake.lock
          tar czf apps/site/public/nix/flake.tar.gz -C /tmp/flake-tarball source

      - name: Commit flake updates
        run: |
          git add flake.nix flake.lock apps/site/public/nix/flake.tar.gz
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore(nix): update flake to CLI v${{ needs.release.outputs.version }}"
          git push origin HEAD:${{ github.ref_name }}

name: Release CLI

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: false
        type: choice
        options:
          - none
          - patch
          - minor
          - major
        default: "none"
      custom_version:
        description: "Custom version (e.g., 1.2.3) - leave empty to use version_type"
        required: false
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: [self-hosted, uvacompute]
    outputs:
      version: ${{ steps.version.outputs.new_version }}
    steps:
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git jq unzip >/dev/null 2>&1

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine new version
        id: version
        run: |
          cd apps/cli
          CURRENT_VERSION=$(cat package.json | jq -r '.version')
          echo "Current version: $CURRENT_VERSION"

          if [ -n "${{ inputs.custom_version }}" ]; then
            NEW_VERSION="${{ inputs.custom_version }}"
            echo "Using custom version: $NEW_VERSION"
          elif [ "${{ inputs.version_type }}" != "none" ]; then
            IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"
            case "${{ inputs.version_type }}" in
              major)
                NEW_VERSION="$((major + 1)).0.0"
                ;;
              minor)
                NEW_VERSION="${major}.$((minor + 1)).0"
                ;;
              patch)
                NEW_VERSION="${major}.${minor}.$((patch + 1))"
                ;;
            esac
            echo "Bumping ${{ inputs.version_type }}: $NEW_VERSION"
          else
            echo "Error: Must specify either custom_version or version_type"
            exit 1
          fi

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update package.json and man page
        run: |
          cd apps/cli
          jq '.version = "${{ steps.version.outputs.new_version }}"' package.json > package.json.tmp
          mv package.json.tmp package.json
          cat package.json

          RELEASE_DATE=$(date '+%B %Y')
          sed -i "s/^\.TH UVA 1 \"[^\"]*\" \"uvacompute [^\"]*\"/.TH UVA 1 \"${RELEASE_DATE}\" \"uvacompute ${{ steps.version.outputs.new_version }}\"/" uva.1

      - name: Commit version bump
        run: |
          git add apps/cli/package.json apps/cli/uva.1
          git commit -m "chore(cli): bump version to ${{ steps.version.outputs.new_version }}"
          git tag "cli-v${{ steps.version.outputs.new_version }}"
          git push origin HEAD:${{ github.ref_name }}
          git push origin "cli-v${{ steps.version.outputs.new_version }}"

  build:
    needs: release
    runs-on: [self-hosted, uvacompute]
    steps:
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git unzip >/dev/null 2>&1

      - uses: actions/checkout@v4
        with:
          ref: cli-v${{ needs.release.outputs.version }}

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install
        working-directory: ./apps/cli

      - name: Build all platform binaries
        run: |
          mkdir -p dist
          echo "Building Linux x64 binary..."
          bun build --compile --target=bun-linux-x64 --define process.env.NODE_ENV='"production"' ./index.ts --outfile ./dist/uvacompute-linux
          echo "Building macOS x64 binary..."
          bun build --compile --target=bun-darwin-x64 --define process.env.NODE_ENV='"production"' ./index.ts --outfile ./dist/uvacompute-macos
          echo "Building Windows x64 binary..."
          bun build --compile --target=bun-windows-x64 --define process.env.NODE_ENV='"production"' ./index.ts --outfile ./dist/uvacompute-windows.exe
        working-directory: ./apps/cli

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: uvacompute-linux
          path: ./apps/cli/dist/uvacompute-linux
          retention-days: 1

      - name: Upload macOS binary
        uses: actions/upload-artifact@v4
        with:
          name: uvacompute-macos
          path: ./apps/cli/dist/uvacompute-macos
          retention-days: 1

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: uvacompute-windows.exe
          path: ./apps/cli/dist/uvacompute-windows.exe
          retention-days: 1

  upload-man-page:
    needs: release
    runs-on: [self-hosted, uvacompute]
    steps:
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git >/dev/null 2>&1

      - uses: actions/checkout@v4
        with:
          ref: cli-v${{ needs.release.outputs.version }}

      - name: Upload man page artifact
        uses: actions/upload-artifact@v4
        with:
          name: uva.1
          path: ./apps/cli/uva.1
          retention-days: 1

  create-release:
    needs: [release, build, upload-man-page]
    runs-on: [self-hosted, uvacompute]
    steps:
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git >/dev/null 2>&1

      - uses: actions/checkout@v4
        with:
          ref: cli-v${{ needs.release.outputs.version }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: cli-v${{ needs.release.outputs.version }}
          name: CLI v${{ needs.release.outputs.version }}
          files: |
            ./dist/uvacompute-linux/uvacompute-linux
            ./dist/uvacompute-macos/uvacompute-macos
            ./dist/uvacompute-windows.exe/uvacompute-windows.exe
            ./dist/uva.1/uva.1
          generate_release_notes: true

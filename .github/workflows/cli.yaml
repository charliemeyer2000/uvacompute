name: Build and Test CLI
on:
  push:
    branches: [main]
    paths:
      - "apps/cli/**"
  pull_request:
    paths:
      - "apps/cli/**"

permissions:
  contents: read

jobs:
  build-and-test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            artifact: uvacompute-linux
          - os: macos-latest
            target: darwin-x64
            artifact: uvacompute-macos
          - os: windows-latest
            target: win32-x64
            artifact: uvacompute-windows.exe

    runs-on: ${{ matrix.os }}

    # On PRs, only run Linux build. On push to main, run all platforms.
    if: ${{ github.event_name == 'push' || matrix.os == 'ubuntu-latest' }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('apps/cli/bun.lockb') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install
        working-directory: ./apps/cli

      - name: Build binary
        run: bun build --compile --define process.env.NODE_ENV='"production"' ./index.ts --outfile ./dist/${{ matrix.artifact }}
        working-directory: ./apps/cli

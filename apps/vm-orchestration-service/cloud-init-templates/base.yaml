#cloud-config
# UVACompute Base VM Configuration

package_update: true
package_upgrade: false

# Configure external DNS early using bootcmd (runs before networking/packages)
# This bypasses cluster DNS issues and works with systemd-resolved
bootcmd:
  # Configure systemd-resolved to use Google DNS
  - mkdir -p /etc/systemd/resolved.conf.d
  - |
    cat > /etc/systemd/resolved.conf.d/dns.conf << 'EOF'
    [Resolve]
    DNS=8.8.8.8 8.8.4.4
    FallbackDNS=1.1.1.1 1.0.0.1
    EOF
  - systemctl restart systemd-resolved || true
  # Also set resolv.conf directly as fallback
  - |
    if [ -L /etc/resolv.conf ]; then
      rm -f /etc/resolv.conf
      echo "nameserver 8.8.8.8" > /etc/resolv.conf
      echo "nameserver 8.8.4.4" >> /etc/resolv.conf
    fi

packages:
  - curl
  - wget
  - git
  - vim
  - htop
  - jq
  - python3
  - python3-pip
  - python3-venv
  - build-essential
  - gcc
  - g++
  - make

runcmd:
  # Start SSH immediately (Ubuntu cloud image has it installed but not always enabled)
  - systemctl enable ssh || systemctl enable sshd || true
  - systemctl start ssh || systemctl start sshd || true
  - echo "SSH started at $(date)" >> /var/log/uvacompute-init.log

  # Install uv (Python package manager)
  - curl -LsSf https://astral.sh/uv/install.sh | sh
  - echo 'export PATH="$HOME/.local/bin:$PATH"' >> /root/.bashrc

  # Install nvm and Node.js
  - curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.1/install.sh | bash
  - export NVM_DIR="/root/.nvm" && . "$NVM_DIR/nvm.sh" && nvm install 22 && nvm use 22 && nvm alias default 22

  # Install ruff (Python linter)
  - /root/.local/bin/uv tool install ruff || true

  - echo "UVACompute initialization complete at $(date)" >> /var/log/uvacompute-init.log

final_message: "UVACompute VM ready after $UPTIME seconds"
